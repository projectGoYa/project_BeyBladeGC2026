<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Kanban Board</title>
    <!-- SortableJS CDN: ドラッグ&ドロップを簡単に実装するライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ライブラリが要素を移動させている間のスタイル */
        .sortable-ghost {
            opacity: 0.4;
            background-color: #cbd5e1 !important;
        }
        .sortable-drag {
            cursor: grabbing;
        }
        /* 削除ボタンのスタイルとアニメーション */
        .delete-btn {
            background-color: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }
        .delete-btn:hover {
            background-color: #475569;
            color: white;
            border-color: #475569;
            transform: scale(1.1);
        }
        /* 「進行中」カラム内では削除ボタンを非表示にする */
        #doing-list .delete-btn {
            display: none;
        }
        /* 削除時のフェードアウトアニメーション */
        .fade-out {
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.2s ease-out;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-800">My Kanban Board</h1>
            <p class="text-slate-600">カードをドラッグして進捗を管理しましょう</p>
        </header>

        <!-- カンバンボード・コンテナ -->
        <div class="flex flex-col md:flex-row gap-6 items-start">
            
            <!-- 未着手 カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        <span class="w-3 h-3 bg-red-400 rounded-full mr-2"></span>
                        未着手
                    </h2>
                    <span id="todo-count" class="text-xs bg-slate-300 px-2 py-1 rounded-full text-slate-600 font-medium">0</span>
                </div>
                <!-- ドラッグ可能領域 -->
                <div id="todo-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-grab active:cursor-grabbing relative transition-all">
                        <button onclick="removeCard(this)" title="タスクを削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                        <p class="text-slate-800 font-medium pr-10">ロゴデザイン案の作成</p>
                        <span class="text-xs text-slate-400 mt-2 block">期限: 10/20</span>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-grab active:cursor-grabbing relative transition-all">
                        <button onclick="removeCard(this)" title="タスクを削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                        <p class="text-slate-800 font-medium pr-10">競合他社のリサーチ</p>
                        <span class="text-xs text-slate-400 mt-2 block">優先度: 高</span>
                    </div>
                </div>
                <!-- タスク追加ボタン -->
                <button onclick="addTask('todo-list')" class="mt-4 w-full py-2 border-2 border-dashed border-slate-400 rounded-lg text-slate-500 hover:bg-slate-300 hover:text-slate-700 transition-colors text-sm font-medium">
                    + タスクを追加
                </button>
            </div>

            <!-- 進行中 カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        <span class="w-3 h-3 bg-blue-400 rounded-full mr-2"></span>
                        進行中
                    </h2>
                    <span id="doing-count" class="text-xs bg-slate-300 px-2 py-1 rounded-full text-slate-600 font-medium">0</span>
                </div>
                <div id="doing-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-grab active:cursor-grabbing relative transition-all">
                        <button onclick="removeCard(this)" title="タスクを削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                        <p class="text-slate-800 font-medium pr-10">Webサイトのワイヤーフレーム制作</p>
                    </div>
                </div>
                <button onclick="addTask('doing-list')" class="mt-4 w-full py-2 border-2 border-dashed border-slate-400 rounded-lg text-slate-500 hover:bg-slate-300 hover:text-slate-700 transition-colors text-sm font-medium">
                    + タスクを追加
                </button>
            </div>

            <!-- 完了 カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        <span class="w-3 h-3 bg-green-400 rounded-full mr-2"></span>
                        完了
                    </h2>
                    <span id="done-count" class="text-xs bg-slate-300 px-2 py-1 rounded-full text-slate-600 font-medium">0</span>
                </div>
                <div id="done-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-300 opacity-75 line-through cursor-grab active:cursor-grabbing relative transition-all">
                        <button onclick="removeCard(this)" title="タスクを削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                        <p class="text-slate-500 font-medium pr-10">ドメインの取得</p>
                    </div>
                </div>
                <button onclick="addTask('done-list')" class="mt-4 w-full py-2 border-2 border-dashed border-slate-400 rounded-lg text-slate-500 hover:bg-slate-300 hover:text-slate-700 transition-colors text-sm font-medium">
                    + タスクを追加
                </button>
            </div>

        </div>
    </div>

    <script>
        // Sortableの初期化
        const lists = ['todo-list', 'doing-list', 'done-list'];
        
        lists.forEach(id => {
            const el = document.getElementById(id);
            new Sortable(el, {
                group: 'kanban', // 同じグループ名にすることでカラム間の移動を許可
                animation: 150,  // 移動時のアニメーション速度(ms)
                ghostClass: 'sortable-ghost', // 移動中に表示されるプレースホルダーのクラス
                dragClass: 'sortable-drag',   // ドラッグ中の要素のクラス
                onEnd: function() {
                    updateCounts(); // 移動が終わるたびに件数を更新
                }
            });
        });

        // 簡易的なタスク追加機能
        function addTask(listId) {
            const taskText = prompt("タスク内容を入力してください");
            if (!taskText) return;

            const list = document.getElementById(listId);
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-grab active:cursor-grabbing relative transition-all";
            card.innerHTML = `
                <button onclick="removeCard(this)" title="タスクを削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
                <p class="text-slate-800 font-medium pr-10">${taskText}</p>
            `;
            
            list.appendChild(card);
            updateCounts();
        }

        // カードを削除する機能
        function removeCard(buttonElement) {
            const card = buttonElement.parentElement;
            
            // 確認ダイアログ
            if (confirm("このタスクを削除しますか？")) {
                // アニメーション用のクラスを追加
                card.classList.add('fade-out');
                
                // アニメーション完了後に要素を削除
                setTimeout(() => {
                    card.remove();
                    updateCounts();
                }, 200);
            }
        }

        // 各カラムのタスク件数を更新
        function updateCounts() {
            lists.forEach(id => {
                const count = document.getElementById(id).children.length;
                const baseId = id.split('-')[0];
                document.getElementById(`${baseId}-count`).innerText = count;
            });
        }

        // 初期表示時にも件数を計算
        window.onload = updateCounts;
    </script>
</body>
</html>
