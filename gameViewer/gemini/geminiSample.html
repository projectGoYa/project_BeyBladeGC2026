<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Kanban Board</title>
    <!-- SortableJS CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ライブラリが要素を移動させている間のスタイル */
        .sortable-ghost {
            opacity: 0.4;
            background-color: #cbd5e1 !important;
        }
        .sortable-drag {
            cursor: grabbing;
        }
        /* 削除ボタンのスタイル（落ち着いたグレー） */
        .delete-btn {
            background-color: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }
        .delete-btn:hover {
            background-color: #475569;
            color: white;
            border-color: #475569;
            transform: scale(1.1);
        }
        /* 「進行中」カラム内では削除ボタンを非表示にする */
        #doing-list .delete-btn {
            display: none;
        }
        /* 削除時のフェードアウトアニメーション */
        .fade-out {
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.2s ease-out;
        }
        /* メニューのフェードイン（下からスライドアップ） */
        .menu-enter {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        /* 複数選択時のスタイル */
        .selected-card {
            border-color: #3b82f6 !important;
            border-width: 2px !important;
            background-color: #eff6ff !important;
        }
        .selected-badge {
            display: none;
        }
        .selected-card .selected-badge {
            display: flex;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 pb-32">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">My Kanban Board</h1>
                <p class="text-slate-600">カードを選択すると、画面下部に移動メニューが表示されます</p>
            </div>
        </header>

        <!-- カンバンボード・コンテナ -->
        <div class="flex flex-col md:flex-row gap-6 items-start">
            
            <!-- 未着手 カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        <span class="w-3 h-3 bg-red-400 rounded-full mr-2"></span>
                        未着手
                    </h2>
                    <span id="todo-count" class="text-xs bg-slate-300 px-2 py-1 rounded-full text-slate-600 font-medium">0</span>
                </div>
                <!-- ドラッグ可能領域 -->
                <div id="todo-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                    <!-- 初期カード 1 -->
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-pointer hover:border-slate-400 relative transition-all" onclick="toggleCardSelection(event, this)">
                        <div class="selected-badge absolute -top-2 -left-2 bg-blue-600 text-white rounded-full p-1 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <button onclick="removeCard(event, this)" title="タスクを削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm z-10">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                        <p class="text-slate-800 font-medium pr-10">ロゴデザイン案の作成</p>
                        <span class="text-xs text-slate-400 mt-2 block">期限: 10/20</span>
                    </div>
                    <!-- 初期カード 2 -->
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-pointer hover:border-slate-400 relative transition-all" onclick="toggleCardSelection(event, this)">
                        <div class="selected-badge absolute -top-2 -left-2 bg-blue-600 text-white rounded-full p-1 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <button onclick="removeCard(event, this)" title="タスクを削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm z-10">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                        <p class="text-slate-800 font-medium pr-10">市場調査レポートの確認</p>
                    </div>
                </div>
                <!-- タスク追加ボタン -->
                <button onclick="addTask('todo-list')" class="mt-4 w-full py-2 border-2 border-dashed border-slate-400 rounded-lg text-slate-500 hover:bg-slate-300 hover:text-slate-700 transition-colors text-sm font-medium">
                    + タスクを追加
                </button>
            </div>

            <!-- 進行中 カラム -->
            <div class="bg-blue-100 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col border border-blue-200">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-blue-800 flex items-center">
                        <span class="w-3 h-3 bg-blue-500 rounded-full mr-2"></span>
                        進行中
                    </h2>
                    <span id="doing-count" class="text-xs bg-blue-200 px-2 py-1 rounded-full text-blue-700 font-medium">0</span>
                </div>
                <div id="doing-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-pointer hover:border-slate-400 relative transition-all" onclick="toggleCardSelection(event, this)">
                        <div class="selected-badge absolute -top-2 -left-2 bg-blue-600 text-white rounded-full p-1 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <button onclick="removeCard(event, this)" title="タスクを削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm z-10">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                        <p class="text-slate-800 font-medium pr-10">Webサイトのワイヤーフレーム制作</p>
                    </div>
                </div>
                <button onclick="addTask('doing-list')" class="mt-4 w-full py-2 border-2 border-dashed border-blue-400 rounded-lg text-blue-600 hover:bg-blue-200 hover:text-blue-800 transition-colors text-sm font-medium">
                    + タスクを追加
                </button>
            </div>

            <!-- 完了 カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        <span class="w-3 h-3 bg-green-400 rounded-full mr-2"></span>
                        完了
                    </h2>
                    <span id="done-count" class="text-xs bg-slate-300 px-2 py-1 rounded-full text-slate-600 font-medium">0</span>
                </div>
                <div id="done-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-300 opacity-75 line-through cursor-pointer hover:border-slate-400 relative transition-all" onclick="toggleCardSelection(event, this)">
                        <div class="selected-badge absolute -top-2 -left-2 bg-blue-600 text-white rounded-full p-1 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <button onclick="removeCard(event, this)" title="タスクを削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm z-10">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                        <p class="text-slate-500 font-medium pr-10">ドメインの取得</p>
                    </div>
                </div>
                <button onclick="addTask('done-list')" class="mt-4 w-full py-2 border-2 border-dashed border-slate-400 rounded-lg text-slate-500 hover:bg-slate-300 hover:text-slate-700 transition-colors text-sm font-medium">
                    + タスクを追加
                </button>
            </div>
        </div>
    </div>

    <!-- 移動メニュー（画面下部中央に固定） -->
    <div id="move-menu" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-50 bg-white shadow-2xl border border-slate-200 rounded-2xl w-[90%] max-w-lg p-2 menu-enter flex flex-col sm:flex-row items-center gap-2">
        <div class="px-4 py-2 text-sm font-bold text-blue-600 bg-blue-50 rounded-xl whitespace-nowrap">
            <span id="menu-title-count">0</span>件を選択中
        </div>
        <div class="flex flex-wrap justify-center gap-2 w-full">
            <button onclick="moveSelectedCards('todo-list')" class="flex-grow px-4 py-2.5 text-sm font-medium text-slate-700 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors border border-slate-200">未着手へ</button>
            <button onclick="moveSelectedCards('doing-list')" class="flex-grow px-4 py-2.5 text-sm font-medium text-slate-700 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors border border-slate-200">進行中へ</button>
            <button onclick="moveSelectedCards('done-list')" class="flex-grow px-4 py-2.5 text-sm font-medium text-slate-700 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors border border-slate-200">完了へ</button>
        </div>
    </div>

    <script>
        const lists = ['todo-list', 'doing-list', 'done-list'];
        let selectedCards = [];

        // Sortableの初期化
        lists.forEach(id => {
            const el = document.getElementById(id);
            new Sortable(el, {
                group: 'kanban',
                animation: 150,
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                onEnd: function() {
                    updateCounts();
                }
            });
        });

        // カードの選択切り替え
        function toggleCardSelection(event, card) {
            if (event.target.closest('button')) return;

            event.stopPropagation();
            card.classList.toggle('selected-card');
            
            if (card.classList.contains('selected-card')) {
                selectedCards.push(card);
            } else {
                selectedCards = selectedCards.filter(c => c !== card);
            }

            if (selectedCards.length > 0) {
                showMoveMenu();
            } else {
                closeMenu();
            }
        }

        // 移動メニューの表示
        function showMoveMenu() {
            const menu = document.getElementById('move-menu');
            const countLabel = document.getElementById('menu-title-count');
            countLabel.innerText = selectedCards.length;
            menu.classList.remove('hidden');
        }

        // 選択したすべてのカードを指定したリストに移動
        function moveSelectedCards(targetListId) {
            if (selectedCards.length === 0) return;
            const targetList = document.getElementById(targetListId);
            
            selectedCards.forEach(card => {
                card.classList.remove('selected-card');
                targetList.appendChild(card);
            });
            
            selectedCards = [];
            closeMenu();
            updateCounts();
        }

        // メニューを閉じる
        function closeMenu() {
            document.getElementById('move-menu').classList.add('hidden');
        }

        // メニュー外クリックで閉じる
        window.addEventListener('click', (e) => {
            if (!e.target.closest('#move-menu') && !e.target.closest('.kanban-list div')) {
                selectedCards.forEach(card => card.classList.remove('selected-card'));
                selectedCards = [];
                closeMenu();
            }
        });

        // タスク追加
        function addTask(listId) {
            const taskText = prompt("タスク内容を入力してください");
            if (!taskText) return;

            const list = document.getElementById(listId);
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-pointer hover:border-slate-400 relative transition-all";
            card.onclick = (e) => toggleCardSelection(e, card);
            card.innerHTML = `
                <div class="selected-badge absolute -top-2 -left-2 bg-blue-600 text-white rounded-full p-1 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
                <button onclick="removeCard(event, this)" title="タスクを削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
                <p class="text-slate-800 font-medium pr-10">${taskText}</p>
            `;
            
            list.appendChild(card);
            updateCounts();
        }

        // 削除
        function removeCard(event, buttonElement) {
            event.stopPropagation();
            const card = buttonElement.parentElement;
            if (confirm("このタスクを削除しますか？")) {
                card.classList.add('fade-out');
                selectedCards = selectedCards.filter(c => c !== card);
                if (selectedCards.length === 0) closeMenu();
                
                setTimeout(() => {
                    card.remove();
                    updateCounts();
                }, 200);
            }
        }

        function updateCounts() {
            lists.forEach(id => {
                const listEl = document.getElementById(id);
                if (!listEl) return;
                const count = listEl.children.length;
                const baseId = id.split('-')[0];
                const countEl = document.getElementById(`${baseId}-count`);
                if (countEl) countEl.innerText = count;
            });
        }

        window.onload = updateCounts;
    </script>
</body>
</html>
