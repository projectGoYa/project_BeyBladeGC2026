<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Kanban Board</title>
    <!-- SortableJS CDN: ドラッグ&ドロップを簡単に実装するライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ライブラリが要素を移動させている間のスタイル */
        .sortable-ghost {
            opacity: 0.4;
            background-color: #cbd5e1 !important;
        }
        .sortable-drag {
            cursor: grabbing;
        }
        /* 削除ボタンのスタイルとアニメーション */
        .delete-btn {
            background-color: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }
        .delete-btn:hover {
            background-color: #475569;
            color: white;
            border-color: #475569;
            transform: scale(1.1);
        }
        /* 削除時のフェードアウトアニメーション */
        .fade-out {
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.2s ease-out;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-800">BeyBlade Grand Champions 2026</h1>
        </header>

        <!-- カンバンボード・コンテナ -->
        <div class="flex flex-col md:flex-row gap-6 items-start">
            
            <!-- 選手番号仮置き カラム csv とかで一括で読み込みたいけど人数多いと大変かも -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        次呼ぼうとしている人
                    </h2>
                </div>
                <!-- ドラッグ可能領域 -->
                <div id="todo-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-grab active:cursor-grabbing relative transition-all">
                        <button onclick="removeCard(this)" title="選手削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>                        
                        <p class="text-slate-800 font-medium">000</p>
                    </div>
                </div>
                <!-- 選手追加追加ボタン -->
                <button onclick="addTask('todo-list')" class="mt-4 w-full py-2 border-2 border-dashed border-slate-400 rounded-lg text-slate-500 hover:bg-slate-300 hover:text-slate-700 transition-colors text-sm font-medium">
                    + 選手番号追加（３桁）
                </button>
            </div>

            <!-- 準備しといてね カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        呼ばれるかもよ、準備しといて
                    </h2>
                </div>
                <div id="ready-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                </div>
            </div>

            <!-- 試合中 カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[210px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        スタジアムA
                    </h2>
                </div>
                <div id="stadiumA-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                </div>
            </div>

            <!-- 呼び出し済み カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        再度呼び出し
                    </h2>
                </div>
                <div id="done-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                </div>
            </div>

        </div>
    </div>

    <script>
        // Sortableの初期化
        const lists = ['todo-list', 'ready-list', 'stadiumA-list', 'done-list'];
        
        lists.forEach(id => {
            const el = document.getElementById(id);
            new Sortable(el, {
                group: 'kanban', // 同じグループ名にすることでカラム間の移動を許可
                animation: 150,  // 移動時のアニメーション速度(ms)
                ghostClass: 'sortable-ghost', // 移動中に表示されるプレースホルダーのクラス
                dragClass: 'sortable-drag',   // ドラッグ中の要素のクラス
                onEnd: function() {
                }
            });
        });

        // 選手追加機能
        function addTask(listId) {
            const taskText = prompt("選手の番号を入力してください");
            if (!taskText) return;  // 数字のみに限定とかもできるが、ブレーダーネームとか書けた方が盛り上がるかも？

            const list = document.getElementById(listId);
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-grab active:cursor-grabbing relative transition-all";
            card.innerHTML = `
                <button onclick="removeCard(this)" title="選手削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
                <p class="text-slate-800 font-medium pr-10">${taskText}</p>
            `;
            
            list.appendChild(card);
        }

        // カードを削除する機能
        function removeCard(buttonElement) {
            const card = buttonElement.parentElement;
            
            // 確認ダイアログ
            if (confirm("この選手を削除しますか？")) {
                // アニメーション用のクラスを追加
                card.classList.add('fade-out');
                
                // アニメーション完了後に要素を削除
                setTimeout(() => {
                    card.remove();
                    updateCounts();
                }, 200);
            }
        }
    </script>
</body>
</html>
