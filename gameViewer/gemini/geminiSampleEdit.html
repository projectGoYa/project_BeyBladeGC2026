<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Kanban Board</title>
    <!-- SortableJS CDN: ドラッグ&ドロップを簡単に実装するライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ライブラリが要素を移動させている間のスタイル */
        .sortable-ghost {
            opacity: 0.4;
            background-color: #cbd5e1 !important;
        }
        .sortable-drag {
            cursor: grabbing;
        }
        /* 削除ボタンのスタイルとアニメーション */
        .delete-btn {
            background-color: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }
        .delete-btn:hover {
            background-color: #475569;
            color: white;
            border-color: #475569;
            transform: scale(1.1);
        }
        /* 特定のカラム内では削除ボタンを非表示にする */
        #stadiumA-list .delete-btn,
        #done-list .delete-btn {
            display: none;
        }
        /* 削除時のフェードアウトアニメーション */
        .fade-out {
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.2s ease-out;
        }
        /* メニューのフェードイン（下からスライドアップ） */
        .menu-enter {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        /* 複数選択時のスタイル */
        .selected-card {
            border-color: #3b82f6 !important;
            border-width: 2px !important;
            background-color: #eff6ff !important;
        }
        .selected-badge {
            display: none;
        }
        .selected-card .selected-badge {
            display: flex;
        }
        /* 全選択ボタンのホバー効果 */
        .select-all-btn:hover {
            text-decoration: underline;
            color: #3b82f6;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 pb-32">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">BeyBlade Grand Champions 2026</h1>
            </div>
        </header>

        <!-- カンバンボード・コンテナ -->
        <div class="flex flex-col md:flex-row gap-6 items-start">
            
            <!-- 選手番号仮置き カラム csv とかで一括で読み込みたいけど人数多いと大変かも -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        次呼ぼうとしている人
                    </h2>
                    <div class="flex items-center gap-2">
                        <button id="select-todo-list" onclick="toggleSelectAll('todo-list')" class="select-all-btn text-[10px] font-bold text-slate-500 uppercase tracking-wider transition-colors">全選択</button>
                    </div>
                </div>
                <!-- ドラッグ可能領域 -->
                <div id="todo-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-pointer hover:border-slate-400 relative transition-all" onclick="toggleCardSelection(event, this)">
                        <div class="selected-badge absolute -top-2 -left-2 bg-blue-600 text-white rounded-full p-1 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <button onclick="removeCard(event, this)" title="選手削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm z-10">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>                        
                        <p class="text-slate-800 font-medium">000</p>
                    </div>
                </div>
                <!-- 選手追加追加ボタン -->
                <button onclick="addTask('todo-list')" class="mt-4 w-full py-2 border-2 border-dashed border-slate-400 rounded-lg text-slate-500 hover:bg-slate-300 hover:text-slate-700 transition-colors text-sm font-medium">
                    + 選手番号追加（３桁）
                </button>
            </div>

            <!-- 準備しといてね カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        呼ばれるかもよ、準備しといて
                    </h2>
                    <div class="flex items-center gap-2">
                        <button id="select-ready-list" onclick="toggleSelectAll('ready-list')" class="select-all-btn text-[10px] font-bold text-slate-500 uppercase tracking-wider transition-colors">全選択</button>
                    </div>
                </div>
                <div id="ready-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                </div>
            </div>

            <!-- 試合中 カラム -->
            <div class="bg-red-200 p-4 rounded-xl w-full md:w-1/3 min-h-[210px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        スタジアムA
                    </h2>
                    <div class="flex items-center gap-2">
                        <button id="select-stadiumA-list" onclick="toggleSelectAll('stadiumA-list')" class="select-all-btn text-[10px] font-bold text-slate-500 uppercase tracking-wider transition-colors">全選択</button>
                    </div>
                </div>
                <div id="stadiumA-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                </div>
            </div>

            <!-- 呼び出し済み カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center">
                        再度呼び出し
                    </h2>
                    <div class="flex items-center gap-2">
                        <button id="select-done-list" onclick="toggleSelectAll('done-list')" class="select-all-btn text-[10px] font-bold text-slate-500 uppercase tracking-wider transition-colors">全選択</button>
                    </div>
                </div>
                <div id="done-list" class="kanban-list flex-grow flex flex-col gap-3 p-1">
                </div>
            </div>
        </div>
    </div>

    <!-- コンテキストメニューのテンプレート -->
    <div id="move-menu" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-50 bg-white shadow-2xl border border-slate-200 rounded-2xl w-[90%] max-w-lg p-2 menu-enter flex flex-col sm:flex-row items-center gap-2">
        <div class="px-4 py-2 text-sm font-bold text-blue-600 bg-blue-50 rounded-xl whitespace-nowrap">
            <span id="menu-title-count">0</span>件を選択中
        </div>
        <div class="flex flex-wrap justify-center gap-2 w-full">
            <button id="btn-todo-list" onclick="moveSelectedCards('todo-list')" class="flex-grow px-4 py-2.5 text-sm font-medium text-slate-700 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors border border-slate-200">次呼ぼうとしている人</button>
            <button id="btn-ready-list" onclick="moveSelectedCards('ready-list')" class="flex-grow px-4 py-2.5 text-sm font-medium text-slate-700 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors border border-slate-200">呼ばれるかも</button>
            <button id="btn-stadiumA-list" onclick="moveSelectedCards('stadiumA-list')" class="flex-grow px-4 py-2.5 text-sm font-medium text-slate-700 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors border border-slate-200">スタジアムA</button>
            <button id="btn-done-list" onclick="moveSelectedCards('done-list')" class="flex-grow px-4 py-2.5 text-sm font-medium text-slate-700 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors border border-slate-200">再度呼び出し</button>
        </div>
    </div>

    <script>
        // Sortableの初期化
        const lists = ['todo-list', 'ready-list', 'stadiumA-list', 'done-list'];
        let selectedCards = [];
        
        lists.forEach(id => {
            const el = document.getElementById(id);
            new Sortable(el, {
                group: 'kanban', // 同じグループ名にすることでカラム間の移動を許可
                animation: 150,  // 移動時のアニメーション速度(ms)
                ghostClass: 'sortable-ghost', // 移動中に表示されるプレースホルダーのクラス
                dragClass: 'sortable-drag',   // ドラッグ中の要素のクラス
                onStart: function (evt) {
                    // DOM上の出現順でソート（これが「元の並び順」の定義）
                    selectedCards.sort((a, b) => a.compareDocumentPosition(b) & Node.DOCUMENT_POSITION_FOLLOWING ? -1 : 1);

                    // ドラッグ要素が選択群に含まれる場合、他の要素を一時的に隠す
                    if (evt.item.classList.contains('selected-card')) {
                        selectedCards.forEach(card => {
                            if (card !== evt.item) card.style.display = 'none';
                        });
                    }
                },
                onEnd: function (evt) {
                    const targetList = evt.to;
                    const draggedItem = evt.item;

                    if (draggedItem.classList.contains('selected-card')) {
                        // ドラッグされた要素がドロップされた時点でのインデックスを取得
                        const children = Array.from(targetList.children);
                        const dropIndex = children.indexOf(draggedItem);
                        
                        // 全ての選択されたカードを再表示
                        selectedCards.forEach(card => card.style.display = '');

                        // 元の並び順（selectedCardsの配列順）に従って、ドロップ位置に再挿入
                        // 配列の逆順から挿入することで、dropIndexの位置に正しく順番に並ぶようにする
                        const reversedSelected = [...selectedCards].reverse();
                        reversedSelected.forEach(card => {
                            // targetList.children[dropIndex] の位置に順番に差し込む
                            targetList.insertBefore(card, targetList.children[dropIndex]);
                        });
                    }
                    updateSelectAllButtons();
                }
            });
        });

        // 全選択/解除の切り替え
        function toggleSelectAll(listId) {
            const listEl = document.getElementById(listId);
            const cards = Array.from(listEl.children);
            if (cards.length === 0) return;

            const allSelectedInThisList = cards.every(card => card.classList.contains('selected-card'));

            if (allSelectedInThisList) {
                // 全解除
                cards.forEach(card => {
                    card.classList.remove('selected-card');
                    selectedCards = selectedCards.filter(c => c !== card);
                });
            } else {
                // 全選択
                cards.forEach(card => {
                    if (!card.classList.contains('selected-card')) {
                        card.classList.add('selected-card');
                        selectedCards.push(card);
                    }
                });
            }

            updateMenuUI();
            updateSelectAllButtons();
        }

        // ボタンのラベル更新
        function updateSelectAllButtons() {
            lists.forEach(id => {
                const listEl = document.getElementById(id);
                const btn = document.getElementById(`select-${id}`);
                const cards = Array.from(listEl.children);
                
                if (cards.length === 0) {
                    btn.innerText = "全選択";
                    btn.style.opacity = "0.3";
                    return;
                }
                
                btn.style.opacity = "1";
                const allSelected = cards.every(card => card.classList.contains('selected-card'));
                btn.innerText = allSelected ? "選択解除" : "全選択";
            });
        }
        
        // カードの選択切り替え
        function toggleCardSelection(event, card) {
            // 子要素（削除ボタン）がクリックされた場合は何もしない
            if (event.target.closest('button')) return;

            event.stopPropagation();
            card.classList.toggle('selected-card');
            
            // 選択リストの更新
            if (card.classList.contains('selected-card')) {
                if (!selectedCards.includes(card)) selectedCards.push(card);
            } else {
                selectedCards = selectedCards.filter(c => c !== card);
            }

            updateMenuUI();
            updateSelectAllButtons();
        }

        function updateMenuUI() {            
            // 右クリックのような動作でメニューを表示（1枚以上選択されている時）
            if (selectedCards.length > 0) {
                showMoveMenu();
            } else {
                closeMenu();
            }
        }

        // 移動メニューの表示とボタンの制御
        function showMoveMenu() {
            const menu = document.getElementById('move-menu');
            const countLabel = document.getElementById('menu-title-count');
            countLabel.innerText = selectedCards.length;

            // 全ての選択中のカードが所属しているリストを取得
            const parentLists = new Set(selectedCards.map(card => card.parentElement.id));
            
            // 選択されているカードが「一種類」のリストのみに存在する場合、そのリストへの移動ボタンを隠す
            lists.forEach(id => {
                const btn = document.getElementById(`btn-${id}`);
                if (parentLists.size === 1 && parentLists.has(id)) {
                    btn.classList.add('hidden');
                } else {
                    btn.classList.remove('hidden');
                }
            });

            menu.classList.remove('hidden');
        }


        // ボタン経由での移動
        function moveSelectedCards(targetListId) {
            if (selectedCards.length === 0) return;
            const targetList = document.getElementById(targetListId);

            selectedCards.sort((a, b) => a.compareDocumentPosition(b) & Node.DOCUMENT_POSITION_FOLLOWING ? -1 : 1);
            selectedCards.forEach(card => {
                card.classList.remove('selected-card');
                targetList.appendChild(card);
            });
            
            selectedCards = [];
            
            closeMenu();
            updateSelectAllButtons();
        }

        // メニューを閉じる
        function closeMenu() {
            document.getElementById('move-menu').classList.add('hidden');
        }

        // メニュー外クリックで閉じる（ただしカード自体のクリックは許容）
        window.addEventListener('click', (e) => {
            if (!e.target.closest('#move-menu') && !e.target.closest('.kanban-list div') && !e.target.closest('.select-all-btn')) {
                // カード以外の場所をクリックしたときに全選択を解除する挙動
                selectedCards.forEach(card => card.classList.remove('selected-card'));
                selectedCards = [];
                closeMenu();
                updateSelectAllButtons();
            }
        });


        // 選手追加機能
        function addTask(listId) {
            const taskText = prompt("選手の番号を入力してください");
            if (!taskText) return;  // 数字のみに限定とかもできるが、ブレーダーネームとか書けた方が盛り上がるかも？

            const list = document.getElementById(listId);
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-lg shadow-sm border border-slate-300 cursor-pointer hover:border-slate-400 relative transition-all";
            card.onclick = (e) => toggleCardSelection(e, card);
            card.innerHTML = `
                <div class="selected-badge absolute -top-2 -left-2 bg-blue-600 text-white rounded-full p-1 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
                <button onclick="removeCard(event, this)" title="選手削除" class="absolute top-2 right-2 p-1.5 delete-btn rounded-full transition-all shadow-sm z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
                <p class="text-slate-800 font-medium pr-10">${taskText}</p>
            `;
            
            list.appendChild(card);
            updateSelectAllButtons();
        }

        // カードを削除する機能
        // カードを削除する機能（event.stopPropagation()を追加してメニュー発火を防ぐ）
        function removeCard(event, buttonElement) {
            event.stopPropagation();
            const card = buttonElement.parentElement;
            
            // 確認ダイアログ
            if (confirm("この選手を削除しますか？")) {
                // アニメーション用のクラスを追加
                card.classList.add('fade-out');
                selectedCards = selectedCards.filter(c => c !== card);
                if (selectedCards.length === 0) closeMenu();
                
                // アニメーション完了後に要素を削除
                setTimeout(() => {
                    card.remove();
                    updateSelectAllButtons();
                }, 200);
            }
        }
        window.onload = () => {
            updateSelectAllButtons();
        };
    </script>
</body>
</html>
