<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeyBlade Grand Champions 2026 - Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .kanban-column {
            transition: all 0.3s ease;
        }
        .card-enter {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body {
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">BeyBlade Grand Champions 2026 - Viewer</h1>
            </div>
        </header>

        <div class="flex flex-col md:flex-row gap-6 items-start">
            <!-- そろそろ呼び出し -->
            <div class="bg-yellow-50 p-4 rounded-xl w-full md:w-1/3 min-h-[556px] flex flex-col border border-yellow-100 shadow-inner">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        そろそろ呼び出します！<br>準備してください
                    </h2>
                </div>
                <div id="ready-list" class="flex flex-col gap-3"></div>
            </div>

            <!-- 試合中 カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[556px] flex flex-col border border-blue-100 shadow-inner">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        スタジアムA
                    </h2>
                </div>
                <div id="stadiumA-list" class="bg-red-200  flex flex-col gap-3 p-1 min-h-[210px]"></div><br>

                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        スタジアムB
                    </h2>
                </div>
                <div id="stadiumB-list" class="bg-blue-200 flex flex-col gap-3 p-1 min-h-[210px]"></div>
            </div>

            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[556px] flex flex-col border border-blue-100 shadow-inner">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        スタジアムC
                    </h2>
                </div>
                <div id="stadiumC-list" class="bg-green-200  flex flex-col gap-3 p-1 min-h-[210px]"></div><br>

                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        スタジアムD
                    </h2>
                </div>
                <div id="stadiumD-list" class="bg-orange-200 flex flex-col gap-3 p-1 min-h-[210px]"></div>
            </div>
            
            <!-- 完了 -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[556px] flex flex-col shadow-inner">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        また後で呼び出します<br>　
                    </h2>
                </div>
                <div id="done-list" class="flex flex-col gap-3"></div>
            </div>
        </div>
    </div>

    <script>
        const lists = ['ready-list', 'stadiumA-list', 'stadiumB-list', 'stadiumC-list', 'stadiumD-list','done-list'];  // 表示させたくないリストはここで消す
        const STORAGE_KEY = 'kanban_data';

        /**
         * LocalStorageからデータを読み取り、画面を更新する
         */
        function renderBoard() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) return;

            const data = JSON.parse(stored);
            
            lists.forEach(id => {
                const container = document.getElementById(id);
                // const countEl = document.getElementById(`${id.split('-')[0]}-count`);
                const tasks = data[id] || [];
                
                // 現在表示されているテキストのリストを取得
                const currentTasks = Array.from(container.children).map(el => el.querySelector('p').innerText);
                
                // データに変化がある場合のみ再描画（不要なDOM操作を避ける）
                if (JSON.stringify(currentTasks) !== JSON.stringify(tasks)) {
                    container.innerHTML = '';
                    tasks.forEach(text => {
                        const card = document.createElement('div');
                        card.className = "bg-white p-4 rounded-lg shadow-sm border border-slate-200 card-enter";
                        card.innerHTML = `<p class="text-slate-800 font-medium">${text}</p>`;
                        container.appendChild(card);
                    });
                    // countEl.innerText = tasks.length;
                }
            });
        }

        // 初期表示時に実行
        window.onload = renderBoard;

        // 他のタブやウィンドウでのlocalStorage変更を検知
        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY) {
                renderBoard();
            }
        });

        // 定期的な同期チェック（同一タブ内での変更やstorageイベントのフォールバック用）
        setInterval(renderBoard, 1000);
    </script>
</body>
</html>
