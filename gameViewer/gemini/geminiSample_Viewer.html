<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Kanban Board - Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .kanban-column {
            transition: all 0.3s ease;
        }
        .card-enter {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body {
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Kanban Viewer</h1>
                <p class="text-slate-600 font-medium">コントローラーでの操作がリアルタイムに反映されます（閲覧専用）。</p>
            </div>
            <div id="status-badge" class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                LIVE
            </div>
        </header>

        <div class="flex flex-col md:flex-row gap-6 items-start">
            <!-- 未着手 -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col shadow-inner">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        <span class="w-3 h-3 bg-red-400 rounded-full mr-2"></span>未着手
                    </h2>
                    <span id="todo-count" class="text-sm bg-slate-300 px-2.5 py-0.5 rounded-full text-slate-600 font-bold">0</span>
                </div>
                <div id="todo-list" class="flex flex-col gap-3"></div>
            </div>

            <!-- 進行中 -->
            <div class="bg-blue-50 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col border border-blue-100 shadow-inner">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-blue-800 flex items-center text-lg">
                        <span class="w-3 h-3 bg-blue-500 rounded-full mr-2"></span>進行中
                    </h2>
                    <span id="doing-count" class="text-sm bg-blue-200 px-2.5 py-0.5 rounded-full text-blue-700 font-bold">0</span>
                </div>
                <div id="doing-list" class="flex flex-col gap-3"></div>
            </div>

            <!-- 完了 -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[500px] flex flex-col shadow-inner">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        <span class="w-3 h-3 bg-green-400 rounded-full mr-2"></span>完了
                    </h2>
                    <span id="done-count" class="text-sm bg-slate-300 px-2.5 py-0.5 rounded-full text-slate-600 font-bold">0</span>
                </div>
                <div id="done-list" class="flex flex-col gap-3"></div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'kanban_data';
        const lists = ['todo-list', 'doing-list', 'done-list'];

        /**
         * LocalStorageからデータを読み取り、画面を更新する
         */
        function renderBoard() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) return;

            const data = JSON.parse(stored);
            
            lists.forEach(id => {
                const container = document.getElementById(id);
                const countEl = document.getElementById(`${id.split('-')[0]}-count`);
                const tasks = data[id] || [];
                
                // 現在表示されているテキストのリストを取得
                const currentTasks = Array.from(container.children).map(el => el.querySelector('p').innerText);
                
                // データに変化がある場合のみ再描画（不要なDOM操作を避ける）
                if (JSON.stringify(currentTasks) !== JSON.stringify(tasks)) {
                    container.innerHTML = '';
                    tasks.forEach(text => {
                        const card = document.createElement('div');
                        card.className = "bg-white p-4 rounded-lg shadow-sm border border-slate-200 card-enter";
                        card.innerHTML = `<p class="text-slate-800 font-medium">${text}</p>`;
                        container.appendChild(card);
                    });
                    countEl.innerText = tasks.length;
                }
            });
        }

        // 初期表示時に実行
        window.onload = renderBoard;

        // 他のタブやウィンドウでのlocalStorage変更を検知
        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY) {
                renderBoard();
            }
        });

        // 定期的な同期チェック（同一タブ内での変更やstorageイベントのフォールバック用）
        setInterval(renderBoard, 1000);
    </script>
</body>
</html>
