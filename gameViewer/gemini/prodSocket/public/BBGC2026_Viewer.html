<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeyBlade Grand Champions 2026 - Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .kanban-column {
            transition: all 0.3s ease;
        }
        .card-enter {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body {
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">BeyBlade Grand Champions 2026 - Viewer</h1>
            </div>
        </header>

        <div class="flex flex-col md:flex-row gap-6 items-start">
            <!-- 待機 -->
            <div class="bg-yellow-50 p-4 rounded-xl w-full md:w-1/3 min-h-[566px] flex flex-col shadow-inner">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-sm">
                        ベイ、ランチャー全てお持ちの上<br>待機列に集合してください
                    </h2>
                </div>
                <div id="wait-list" class="flex flex-col gap-3"></div>
            </div>

            <!-- 試合中 カラム -->
            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[566px] flex flex-col border border-blue-100 shadow-inner">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        スタジアムA
                    </h2>
                </div>
                <div id="stadiumA-list" class="bg-red-200  flex flex-col gap-3 p-1 min-h-[210px]"></div><br>

                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        スタジアムB
                    </h2>
                </div>
                <div id="stadiumB-list" class="bg-blue-200 flex flex-col gap-3 p-1 min-h-[210px]"></div>
            </div>

            <div class="bg-slate-200 p-4 rounded-xl w-full md:w-1/3 min-h-[566px] flex flex-col border border-blue-100 shadow-inner">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        スタジアムC
                    </h2>
                </div>
                <div id="stadiumC-list" class="bg-green-200  flex flex-col gap-3 p-1 min-h-[210px]"></div><br>

                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-slate-700 flex items-center text-lg">
                        スタジアムD
                    </h2>
                </div>
                <div id="stadiumD-list" class="bg-orange-200 flex flex-col gap-3 p-1 min-h-[210px]"></div>
            </div>
        </div>
    </div>

    <script>
        const lists = ['wait-list', 'stadiumA-list', 'stadiumB-list', 'stadiumC-list', 'stadiumD-list'];  // 表示させたくないリストはここで消す
        const socket = io(); // サーバーへ接続

        // サーバーからデータが届いた時の処理
        socket.on('sync', (data) => {
            console.log("データを受信しました:", data); // デバッグ用ログ
            renderBoard(data); 
        });

        function renderBoard(data) {
            // ここにHTMLを生成する処理を記述
            lists.forEach(id => {
                const container = document.getElementById(id);
                if (!container) return;
                
                container.innerHTML = ''; // 一旦クリア
                const tasks = data[id] || [];
                tasks.forEach(text => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-lg shadow-sm border border-slate-200 card-enter";
                    card.innerHTML = `<p class="text-slate-800 font-medium">${text}</p>`;
                    container.appendChild(card);
                });
            });
        }
    </script>
</body>
</html>
